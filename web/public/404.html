<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>404 Not Found | xdai.vip</title>
<style>
.back-home{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);padding:8px 24px;background:rgba(255,255,255,0.3);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;border-radius:4px;text-decoration:none;font-size:28px;z-index:99999;border:1px solid rgba(255,255,255,0.2)}
.back-home:hover{background:rgba(255,255,255,0.5)}
</style>
</head>
<body>
<script src="https://volunteer.cdn-go.cn/404/latest/404.js"></script>
<script>
  var observer = new MutationObserver(function() {
    if (!document.querySelector('.back-home')) {
      var a = document.createElement('a');
      a.className = 'back-home';
      a.href = '/';
      a.textContent = '返回首页';
      document.body.appendChild(a);
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
</script>
</body>
</html>
